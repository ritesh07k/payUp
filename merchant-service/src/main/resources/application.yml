server:
  port: 8082

spring:
  application:
    name: merchant-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:-localhost}:5432/merchant_db
    username: ${DB_USER:-payup_user}
    password: ${DB_PASSWORD:-changeme}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:-localhost}
      port: 6379
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:-localhost:9092}
    consumer:
      group-id: merchant-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.payup.merchant.events"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.payup.merchant.events.MerchantCreatedEvent

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
