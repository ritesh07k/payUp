server:
  port: 8080

spring:
  application:
    name: payup

  datasource:
    url: jdbc:postgresql://localhost:5432/payup
    username: payup_user
    password: REDACTED
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true