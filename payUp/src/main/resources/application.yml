server:
  port: 8080

spring:
  application:
    name: payup
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:payup}
    username: ${DB_USER:payup_user}
    password: ${DB_PASSWORD:REDACTED}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
        reconnect.backoff.ms: 1000
        reconnect.backoff.max.ms: 10000
        request.timeout.ms: 30000
        delivery.timeout.ms: 120000
    consumer:
      group-id: payup-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        reconnect.backoff.ms: 1000
        reconnect.backoff.max.ms: 10000
        session.timeout.ms: 30000
        heartbeat.interval.ms: 10000

application:
  security:
      jwt:
        secret-key: ${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
        expiration: ${JWT_EXPIRATION:900000}
        refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
      webhook-encryption-key: ${WEBHOOK_ENCRYPTION_KEY:changeme_32byte_default_key_here}
