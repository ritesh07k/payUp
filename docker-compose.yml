services:

  postgres:
    image: postgres:16
    container_name: payup-postgres
    environment:
      POSTGRES_DB: payup
      POSTGRES_USER: payup_user
      POSTGRES_PASSWORD: REDACTED
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: payup-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: