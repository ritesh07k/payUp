server:
  port: 8080

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: ${REDIS_HOST:-localhost}
      port: 6379

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**

        - id: merchant-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/merchants/**

        - id: payment-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/orders/**,/api/v1/payments/**

        - id: refund-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/refunds/**

        - id: webhook-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/webhooks/**

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health,prometheus
