server:
  port: 8084

spring:
  application:
    name: refund-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:-localhost}:5432/refund_db
    username: ${DB_USER:-payup_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:-localhost}
      port: 6379

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:-localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: refundProcessedEvent:com.payup.refund.events.RefundProcessedEvent
    consumer:
      group-id: refund-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}

payment-service:
  base-url: ${PAYMENT_SERVICE_URL:http://localhost:8083}
